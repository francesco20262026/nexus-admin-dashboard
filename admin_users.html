    </div>
    <div class="stat-card stat-card--warning">
      <div class="stat-card-top"><div class="stat-card-label" data-i18n="usr.kpi_admin">Admin</div></div>
      <div class="stat-card-val" id="kpi-usr-admin"><div class="skeleton-text skeleton" style="width:40px;height:36px;"></div></div>
      <div class="stat-card-meta" id="kpi-usr-admin-meta"></div>
    </div>
    <div class="stat-card stat-card--info">
      <div class="stat-card-top"><div class="stat-card-label" data-i18n="usr.kpi_operator">Operatori</div></div>

      <div class="stat-card-meta" id="kpi-usr-operator-meta"></div>

    <div class="stat-card stat-card--danger">

  <!-- Users list card -->

      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <select id="usr-filter-company" class="form-input" style="width:auto;min-width:160px;">
          <option value="">Tutti le aziende</option>
        </select>
      </div>
    </div>
    <div style="padding:12px 20px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);" id="usr-tab-bar">

      <button class="filter-tab" data-tab="admin">Admin</button>
      <button class="filter-tab" data-tab="operator">Operatori</button>
      <button class="filter-tab" data-tab="invited">In attesa</button>

      <div id="usr-pagination" style="display:flex;gap:4px;"></div>
    </div>
  </div>
</main>

<!-- Modal: Invita utente -->
<div class="modal-overlay" id="modal-user" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal" style="max-width:480px;width:100%;">
    <div class="modal-header" style="padding:20px 24px 0;">
      <div class="modal-title" id="modal-usr-title">Invita utente</div>
      <button class="icon-btn" onclick="document.getElementById('modal-user').classList.remove('open')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" style="padding:20px 24px;">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nome completo *</label>
          <input class="form-input" id="usr-name" type="text" placeholder="Mario Rossi"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input class="form-input" id="usr-email" type="email" placeholder="mario@azienda.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Ruolo *</label>
          <select class="form-input" id="usr-role">
            <option value="operator">Operatore</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Azienda</label>
          <select class="form-input" id="usr-company-assign"><option value="">Tutte le aziende</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="padding:0 24px 20px;">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-user').classList.remove('open')">Annulla</button>
      <button class="btn btn-primary" id="btn-invite-user">Invia invito</button>
    </div>
  </div>
</div>
