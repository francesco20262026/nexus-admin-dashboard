<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Documenti — Nexus Portal</title>
  <meta name="description" content="Visualizza e firma i tuoi documenti."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/dash.css"/>
</head>
<body>
<div class="shell" id="shell">

<aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6Z"/></svg></div><span class="brand-name">Nexus</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label" data-i18n="nav.my_area">La mia Area</div>
      <a class="nav-item" href="client_dash.html"><span class="nav-label" data-i18n="nav.dashboard">Dashboard</span></a>
      <a class="nav-item" href="client_invoices.html"><span class="nav-label" data-i18n="nav.invoices">Fatture</span></a>
      <a class="nav-item" href="client_contracts.html"><span class="nav-label" data-i18n="nav.contracts">Contratti</span></a>
      <a class="nav-item active" href="client_documents.html"><span class="nav-label" data-i18n="nav.documents">Documenti</span></a>
      <a class="nav-item" href="client_profile.html"><span class="nav-label" data-i18n="nav.profile">Il mio Profilo</span></a>
    </nav>
    <div class="sidebar-footer"><div class="nav-item" style="gap:10px;"><div class="avatar" style="width:30px;height:30px;font-size:11px;" id="sidebar-avatar">—</div><div><div class="nav-label" style="color:var(--gray-900);font-size:13px;font-weight:600;opacity:1;" id="sidebar-name">Caricamento…</div></div></div></div>
  </aside>

<header class="header">
    <button class="header-toggle" id="sidebar-toggle"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button>
    <div class="header-actions" style="margin-left:auto;"><div id="lang-switcher-slot"></div>
    <div class="dropdown-wrap"><button class="profile-btn" data-dropdown-trigger><div class="avatar" id="header-avatar">—</div><div class="profile-info"><div class="profile-name" id="header-name">Caricamento…</div><div class="profile-role" data-i18n="role.client">Cliente</div></div></button><div class="dropdown-menu"><button class="dropdown-item danger" id="logout-btn" data-i18n="auth.sign_out">Esci</button></div></div></div>
  </header>

<main class="main">

  <!-- Action card: pending docs alert (shown by JS if needed) -->
  <div class="alert-card alert-card--warning" id="docs-alert" style="display:none;">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>
    <div>
      <strong data-i18n="client.action_required">Azione richiesta</strong>
      <span id="docs-alert-text" data-i18n="client.docs_pending_alert">Hai documenti in attesa di firma</span>
    </div>
  </div>

  <!-- Page header -->
  <div class="page-header">
    <div>
      <h1 class="page-title" data-i18n="client.docs_title">I miei Documenti</h1>
      <p class="page-subtitle" data-i18n="client.docs_sub">Visualizza e firma i tuoi documenti</p>
    </div>
  </div>

  <!-- Stat chips -->
  <div class="stat-chips">
    <div class="stat-chip"><div class="stat-chip-val" id="chip-docs-total">—</div><div class="stat-chip-lbl" data-i18n="client.docs_title">Documenti</div></div>
    <div class="stat-chip"><div class="stat-chip-val stat-chip-val--warning" id="chip-docs-pending">—</div><div class="stat-chip-lbl" data-i18n="client.pending_sign">Da firmare</div></div>
    <div class="stat-chip"><div class="stat-chip-val stat-chip-val--success" id="chip-docs-signed">—</div><div class="stat-chip-lbl" data-i18n="client.signed">Firmati</div></div>
  </div>

  <!-- Documents table -->
  <div class="card">
    <div class="controls-bar">
      <div class="filter-search">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
        <input type="text" id="docs-search" placeholder="Cerca documenti..." data-i18n="common.search"/>
      </div>
      <select class="filter-select" id="docs-filter-status">
        <option value="all" data-i18n="common.all_status">Tutti gli stati</option>
        <option value="pending" data-i18n="client.pending_sign">Da firmare</option>
        <option value="signed" data-i18n="client.signed">Firmati</option>
        <option value="expired" data-i18n="client.expired">Scaduti</option>
      </select>
    </div>
    <div class="table-wrap">
      <table id="docs-table">
        <thead><tr>
          <th data-i18n="nav.documents">Documento</th>
          <th data-i18n="tbl.type">Tipo</th>
          <th data-i18n="tbl.upload_date">Data caricamento</th>
          <th data-i18n="tbl.signing_deadline">Scadenza firma</th>
          <th data-i18n="tbl.status">Stato</th>
          <th></th>
        </tr></thead>
        <tbody id="docs-tbody"></tbody>
      </table>
    </div>
    <div class="table-footer">
      <span id="docs-info">—</span>
    </div>
  </div>

</main>
</div>
<div id="toast-container" class="toast-container"></div>
<script src="assets/js/api.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/ui.js"></script><script src="assets/js/i18n.js"></script>
<script src="assets/js/dash.js"></script>
<script src="assets/js/client_documents.js"></script>
</body>
</html>
