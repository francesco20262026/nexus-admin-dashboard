<!DOCTYPE html>

<html lang="it">

<head>

  <meta charset="UTF-8"/>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dettaglio Preventivo Nova CRM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <link rel="preload" as="image" href="/assets/img/crm.png" fetchpriority="high">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="assets/css/dash.css"/>

  <link rel="stylesheet" href="assets/css/client_portal.css"/>

  <style>

    .quote-document {

      background: white;

      border: 1px solid var(--border);

      border-radius: 8px;

      padding: 30px;

      max-width: 800px;

      margin: 0 auto;

      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);

    }

    .quote-header-info {

      display: flex;

      justify-content: space-between;

      margin-bottom: 30px;

      border-bottom: 1px solid var(--gray-200);

      padding-bottom: 20px;

    }

    .q-meta { color: var(--gray-500); font-size: 13px; margin-bottom: 4px; }

    .q-val { color: var(--gray-900); font-weight: 600; font-size: 15px; }

    

    .q-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }

    .q-table th { background: var(--gray-50); padding: 12px; text-align: left; font-size: 13px; color: var(--gray-500); border-bottom: 1px solid var(--gray-200); }

    .q-table td { padding: 12px; border-bottom: 1px solid var(--gray-100); font-size: 14px; color: var(--gray-900); }

    

    .q-totals { width: 300px; margin-left: auto; }

    .q-tot-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }

    .q-tot-row.grand { font-size: 18px; font-weight: 700; border-top: 2px solid var(--gray-200); padding-top: 12px; margin-top: 4px; }

    

    .acceptance-box {

      background: var(--gray-50);

      border: 1px solid var(--border);

      border-radius: 8px;

      padding: 24px;

      margin-top: 40px;

      text-align: center;

    }

    .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }

  </style>


  </head>


  </head>

<body style="background:var(--gray-50);">

<div id="shell" style="display:block; min-height:100vh;">



<main class="main" style="max-width: 1000px; margin: 0 auto; padding: 40px 20px;">

  <div class="page-header" style="flex-direction:row; justify-content:space-between; align-items:flex-start;">

    <div>

      <h1 class="page-title" id="qd-title">Preventivo</h1>

    </div>

    <div style="display:flex;gap:10px;">

      <button class="btn btn-secondary" onclick="window.print()">Stampa PDF</button>

    </div>

  </div>



  <div class="quote-document" id="quo-container">

    <div style="text-align:center; padding: 40px; color: var(--gray-400);">Caricamento dettagli preventivo...</div>

  </div>



</main>

</div>

<div id="toast-container" class="toast-container"></div>

<script src="assets/js/api.js?v=1000"></script>

<script src="assets/js/auth.js?v=1000"></script>

<script src="assets/js/ui.js?v=1000"></script>

<script src="assets/js/client_quote_detail.js?v=1000"></script>

</body>

</html>
