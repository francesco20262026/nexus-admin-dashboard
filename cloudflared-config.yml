# Cloudflare Tunnel config — Nexus CRM
# SOSTITUISCI: <TUNNEL-ID> con l'ID del tuo tunnel (mostrato da: cloudflared tunnel create nexus-crm)

tunnel: <TUNNEL-ID>
credentials-file: C:\Users\Administrator\.cloudflared\<TUNNEL-ID>.json

ingress:
  # Frontend — IIS serve i file statici HTML/CSS/JS
  - hostname: crm.delocanova.com
    service: http://localhost:80

  # Backend FastAPI — API del CRM
  - hostname: api.delocanova.com
    service: http://localhost:8000
    originRequest:
      connectTimeout: 30s

  # Fallback obbligatorio
  - service: http_status:404

