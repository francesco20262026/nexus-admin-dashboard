tunnel: 329eaaeb-794e-4090-b0e4-166c0cd3516f
credentials-file: C:\Users\administrator.IMPIEGANDO\.cloudflared\329eaaeb-794e-4090-b0e4-166c0cd3516f.json

ingress:
  # Frontend — IIS serve i file statici HTML/CSS/JS
  - hostname: crm.delocanova.com
    service: http://localhost:80

  # Backend FastAPI — API del CRM
  - hostname: api.delocanova.com
    service: http://localhost:8000
    originRequest:
      connectTimeout: 30s

  # Fallback obbligatorio
  - service: http_status:404

