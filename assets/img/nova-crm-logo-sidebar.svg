<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 46" role="img" aria-label="Nova CRM">
  <defs>
    <linearGradient id="dlcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <clipPath id="dlcClip">
      <circle cx="22" cy="23" r="19"/>
    </clipPath>
  </defs>

  <!-- Badge circle -->
  <circle cx="22" cy="23" r="19" fill="url(#dlcGrad)"/>

  <!-- Outer subtle ring -->
  <circle cx="22" cy="23" r="16.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

  <!-- Triangle 1 — pointing UP (D top · L bottom-left · C bottom-right) -->
  <polygon points="22,8 35,31 9,31"
           fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.45)" stroke-width="1.1"
           stroke-linejoin="round" clip-path="url(#dlcClip)"/>

  <!-- Triangle 2 — pointing DOWN, interlocks with triangle 1 -->
  <polygon points="22,38 35,15 9,15"
           fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"
           stroke-linejoin="round" clip-path="url(#dlcClip)"/>

  <!-- D — top vertex of triangle 1 -->
  <text x="22" y="9.5" text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="900" fill="white">D</text>

  <!-- L — bottom-left vertex -->
  <text x="9.5" y="35" text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="900" fill="white">L</text>

  <!-- C — bottom-right vertex -->
  <text x="34.5" y="35" text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="900" fill="white">C</text>

  <!-- Central dot accent -->
  <circle cx="22" cy="23" r="1.6" fill="rgba(255,255,255,0.55)"/>

  <!-- "Nova" bold dark navy -->
  <text x="50" y="30"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif"
        font-size="19" font-weight="800" fill="#0f172a">Nova</text>

  <!-- " CRM" green -->
  <text x="100" y="30"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif"
        font-size="19" font-weight="400" fill="#059669"> CRM</text>
</svg>
