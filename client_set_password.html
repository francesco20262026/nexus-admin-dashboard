<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Imposta Password — Nova CRM v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preload" as="image" href="/assets/img/nova-crm-logo.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0fdf4; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #111827; }
    .card { background: #fff; border-radius: 16px; padding: 48px 40px; max-width: 440px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo img { height: 64px; width: auto; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 32px; }
    .email-badge { background: #f0fdf4; border: 1.5px solid #d1fae5; border-radius: 8px; padding: 10px 14px; font-size: 14px; color: #065f46; font-weight: 500; margin-bottom: 24px; display: none; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type=password] { width: 100%; padding: 10px 14px; border: 1.5px solid #d1fae5; border-radius: 8px; font-size: 15px; outline: none; font-family: inherit; transition: border-color .2s; }
    input[type=password]:focus { border-color: #0a9669; }
    .field { margin-bottom: 20px; }
    .strength-bar { height: 4px; border-radius: 4px; margin-top: 6px; background: #e5e7eb; }
    .strength-fill { height: 100%; border-radius: 4px; width: 0%; transition: width .3s, background .3s; }
    .btn { width: 100%; padding: 12px; background: #0a9669; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .2s, opacity .2s; }
    .btn:hover { background: #088558; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
    .msg.success { background: #d1fae5; color: #065f46; display: block; }
    .msg.error { background: #fee2e2; color: #991b1b; display: block; }
    .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin: auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-spinner { display: block; margin: 0 auto 12px; width: 36px; height: 36px; border: 3px solid #d1fae5; border-top-color: #0a9669; border-radius: 50%; animation: spin .7s linear infinite; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/assets/img/nova-crm-logo.jpeg" alt="Nova CRM" loading="eager">
  </div>

  <div id="loading-view" style="text-align:center;padding:20px 0;">
    <div class="loading-spinner"></div>
    <p style="color:#6b7280;font-size:14px;">Verifica in corso…</p>
  </div>

  <div id="form-view" style="display:none;">
    <h1>Crea la tua password</h1>
    <p class="subtitle">Scegli una password sicura per accedere alla tua Area Clienti.</p>
    <div class="email-badge" id="email-badge">✉️ <span id="email-display"></span></div>
    <div class="field">
      <label for="pw1">Nuova password</label>
      <input type="password" id="pw1" placeholder="Minimo 8 caratteri" oninput="checkStrength()">
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    </div>
    <div class="field">
      <label for="pw2">Conferma password</label>
      <input type="password" id="pw2" placeholder="Ripeti la password">
    </div>
    <button class="btn" id="btn-set" onclick="setPassword()">
      <span id="btn-label">Imposta password e accedi</span>
      <div class="spinner" id="btn-spinner"></div>
    </button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="error-view" style="display:none; text-align:center;">
    <p style="font-size:48px;margin-bottom:16px;">🔗</p>
    <h1 style="color:#991b1b;margin-bottom:8px;">Link non valido</h1>
    <p class="subtitle" id="error-detail">Il link è scaduto o non valido.<br>Contatta l'assistenza per richiederne uno nuovo.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://nbobzshjajgbmprhgxio.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ib2J6c2hqYWpnYm1wcmhneGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTU3MjYsImV4cCI6MjA4OTMzMTcyNn0.VhTyA96kVjlWHLObIDPPBLtL7iIb5wGIk4cMJ9YbTEw';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { flowType: 'implicit' }
  });

  function show(id) {
    ['loading-view','form-view','error-view'].forEach(v =>
      document.getElementById(v).style.display = v === id ? '' : 'none'
    );
  }

  function showError(msg) {
    if (msg) document.getElementById('error-detail').textContent = msg;
    show('error-view');
  }

  async function showForm(user) {
    const email = user?.email;
    if (email) {
      document.getElementById('email-display').textContent = email;
      document.getElementById('email-badge').style.display = 'block';
    }
    show('form-view');
    document.getElementById('pw1').focus();
  }

  async function init() {
    const hash    = window.location.hash;
    const hParams = new URLSearchParams(hash.replace('#',''));
    const qParams = new URLSearchParams(window.location.search);

    // 1. Error in URL?
    if (hParams.get('error_code') || hParams.get('error')) {
      showError('Il link è scaduto o non valido. Richiedi un nuovo invito.');
      return;
    }

    // 2. PKCE code in query string?
    const code = qParams.get('code');
    if (code) {
      try {
        const { data, error } = await sb.auth.exchangeCodeForSession(code);
        if (error || !data?.session) { showError(error?.message); return; }
        await showForm(data.session.user);
      } catch(e) { showError(); }
      return;
    }

    // 3. Tokens in hash? setSession() directly -- most reliable approach
    const accessToken  = hParams.get('access_token');
    const refreshToken = hParams.get('refresh_token');
    if (accessToken) {
      try {
        let sessResult;
        if (refreshToken) {
          sessResult = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        } else {
          // Only access_token -- try to get user directly
          sessResult = await sb.auth.getUser(accessToken);
          if (!sessResult.error && sessResult.data?.user) {
            await showForm(sessResult.data.user); return;
          }
        }
        const { data, error } = sessResult;
        if (error) {
          showError('Errore Supabase: ' + error.message + '. Richiedi un nuovo invito.');
          return;
        }
        if (data?.session) { await showForm(data.session.user); return; }
        if (data?.user) { await showForm(data.user); return; }
      } catch(e) {
        showError('Errore: ' + (e.message || 'sconosciuto') + '. Richiedi un nuovo invito.');
        return;
      }
    }

    // 4. No tokens in URL -- check existing session
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { await showForm(session.user); return; }
    } catch(e) {}

    // 5. Nothing found
    showError('Nessun link valido trovato. Richiedi un nuovo invito.');
  }

  function checkStrength() {
    const v = document.getElementById('pw1').value;
    const fill = document.getElementById('strength-fill');
    const score = [v.length >= 8, /[A-Z]/.test(v), /[0-9]/.test(v), /[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
    fill.style.width = (score * 25) + '%';
    fill.style.background = ['#ef4444','#f59e0b','#3b82f6','#0a9669'][score-1] || '#e5e7eb';
  }

  async function setPassword() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const msg = document.getElementById('msg');
    msg.className = 'msg';

    if (pw1.length < 8) { msg.className='msg error'; msg.textContent='La password deve essere di almeno 8 caratteri.'; return; }
    if (pw1 !== pw2)    { msg.className='msg error'; msg.textContent='Le password non coincidono.'; return; }

    document.getElementById('btn-label').style.display = 'none';
    document.getElementById('btn-spinner').style.display = 'block';
    document.getElementById('btn-set').disabled = true;

    try {
      const { error } = await sb.auth.updateUser({ password: pw1 });
      if (error) {
        msg.className = 'msg error';
        msg.textContent = error.message;
      } else {
        msg.className = 'msg success';
        msg.textContent = '✓ Password impostata! Accesso in corso…';
        setTimeout(() => { window.location.href = '/client_dash.html'; }, 1200);
      }
    } catch(e) {
      msg.className = 'msg error';
      msg.textContent = 'Errore imprevisto. Riprova.';
    } finally {
      document.getElementById('btn-label').style.display = '';
      document.getElementById('btn-spinner').style.display = 'none';
      document.getElementById('btn-set').disabled = false;
    }
  }

  init();
</script>
</body>
</html>
