<main class="main">



  <!-- Page header -->

  <div class="page-header">

    <div>

      <h1 class="page-title" data-i18n="client.invoices_title">Le mie Fatture</h1>

    </div>

  </div>



  <!-- Stat chips -->

  <div class="stat-chips">

    <div class="stat-chip">

      <div class="stat-chip-val" id="chip-inv-total"></div>

      <div class="stat-chip-lbl" data-i18n="nav.invoices">Totale</div>

    </div>

    <div class="stat-chip">

      <div class="stat-chip-val stat-chip-val--warning" id="chip-inv-open"></div>

      <div class="stat-chip-lbl" data-i18n="client.invoice_open">Da pagare</div>

    </div>

    <div class="stat-chip">

      <div class="stat-chip-val stat-chip-val--danger" id="chip-inv-overdue"></div>

      <div class="stat-chip-lbl">In verifica</div>

    </div>

    <div class="stat-chip">

      <div class="stat-chip-val stat-chip-val--success" id="chip-inv-paid"></div>

      <div class="stat-chip-lbl" data-i18n="client.invoice_paid">Pagate</div>

    </div>

    <div class="stat-chip">

      <div class="stat-chip-val stat-chip-val--brand" id="chip-inv-amount"></div>

      <div class="stat-chip-lbl" data-i18n="client.invoice_total">Totale pagato</div>

    </div>

  </div>



  <!-- Invoices table -->

  <div class="card">

    <div class="controls-bar">

      <div class="filter-search">

        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>

        <input type="text" id="inv-search" placeholder="Cerca fatture..." data-i18n="common.search"/>

      </div>

      <select class="filter-select" id="inv-filter-status">

        <option value="all"            data-i18n="common.all_status">Tutti gli stati</option>

        <option value="not_paid">Da pagare</option>

        <option value="proof_uploaded">Prova inviata</option>

        <option value="under_review">In verifica</option>

        <option value="paid"           data-i18n="client.invoice_paid">Pagate</option>

        <option value="proforma">Proforma</option>

        <option value="cancelled">Annullate</option>

      </select>

    </div>

    <div class="table-wrap">

      <table id="inv-table">

        <thead><tr>

          <th data-i18n="tbl.invoice">Fattura</th>

          <th data-i18n="tbl.issue_date">Data emissione</th>

          <th data-i18n="tbl.due">Scadenza</th>

          <th data-i18n="tbl.amount" style="text-align:right;">Importo</th>

          <th data-i18n="tbl.status">Stato</th>

          <th></th>

        </tr></thead>

        <tbody id="inv-tbody"></tbody>

      </table>

    </div>

    <div class="table-footer">

      <span id="inv-info"></span>

      <div class="pagination" id="inv-pagination"></div>

    </div>

  </div>
